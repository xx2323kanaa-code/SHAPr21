<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greifer SHAPr21 Tray Support Task v1</title>
<style>
  body { margin:0; overflow:hidden; font-family:system-ui, sans-serif; background:#eef8ee; }
  #info { position:fixed; top:12px; left:50%; transform:translateX(-50%); background:#ffffffdd; padding:8px 14px; border-radius:12px; font-size:14px; text-align:center; max-width:92vw; z-index:5; }
  #hud { position:fixed; top:12px; left:12px; background:#ffffffdd; border-radius:12px; padding:9px 10px; font-size:14px; line-height:1.45; z-index:5; min-width:122px; box-shadow:0 3px 12px #0001; }
  #modeBox { position:fixed; top:132px; left:12px; background:#ffffffdd; border-radius:12px; padding:7px 8px; z-index:5; font-size:12px; width:74px; box-shadow:0 3px 12px #0001; }
  #modeBox .modeTitle { font-weight:700; margin:0 0 5px 0; text-align:center; font-size:12px; }
  #modeBox button { display:block; width:100%; margin:4px 0; padding:6px 2px; border-radius:8px; border:1px solid #777; background:#f7f7f7; font-size:12px; line-height:1.05; }
  #modeBox button.on { background:#dff3ff; border-color:#178ad6; font-weight:700; }
  #resetBtn { border-color:#b77 !important; background:#fff7f7 !important; font-weight:700; }
  #setBtn { border-color:#3b8b3b !important; background:#eaffea !important; font-weight:700; }
  #setBtn.on { background:#bff5bf !important; border-color:#118811 !important; }
  #calibBox { display:none; margin-top:5px; border-top:1px solid #ddd; padding-top:5px; }
  #calibBox button { background:#fff !important; }
  #calibBox button.on { background:#ffe7b7 !important; border-color:#c77700 !important; }
  #controlBar { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); display:flex; flex-direction:row; align-items:center; justify-content:center; gap:8px; z-index:9; }
  #btn, #startTaskBtn, #timerTaskBtn { position:static; width:auto; min-width:0; height:30px; border-radius:8px; border:1px solid #777; background:#f5f5f5; font-size:12px; font-weight:700; line-height:1.05; padding:4px 10px; white-space:nowrap; overflow:visible; text-overflow:clip; box-sizing:border-box; }
  #btn:active, #startTaskBtn:active, #timerTaskBtn:active { background:#eaffea; }
  #startTaskBtn, #timerTaskBtn { background:#fff7df; }
  #timerTaskBtn.running { background:#ffe7e7; border-color:#b77; }
  #startTaskBtn.done { background:#e7ffe7; border-color:#7b7; }
  #btn span { display:none; }
  #panel { position:fixed; top:68px; right:14px; width:350px; max-height:82vh; overflow:auto; background:#ffffffee; border:1px solid #bbb; border-radius:12px; padding:12px; font-size:13px; box-shadow:0 6px 18px #0002; z-index:8; }
  #panel h3 { margin:0 0 8px; font-size:15px; }
  #panel h4 { margin:12px 0 4px; font-size:13px; border-top:1px solid #ddd; padding-top:8px; }
  #panel label { display:grid; grid-template-columns:86px 1fr 58px; gap:8px; align-items:center; margin:7px 0; }
  #panel input[type=range] { width:100%; }
  .rangeWrap { position:relative; display:block; width:100%; }
  .initialDot { position:absolute; top:50%; width:8px; height:8px; border-radius:50%; background:#e60000; transform:translate(-50%,-50%); pointer-events:none; box-shadow:0 0 0 1px #fff; }
  #panel button { margin:4px 3px 0 0; padding:6px 8px; border-radius:8px; border:1px solid #777; background:#f7f7f7; }
  #panelToggle { width:100%; margin:0 0 8px 0 !important; font-weight:700; }
  #panel.collapsed { top:76px; right:12px; width:44px; height:44px; max-height:44px; overflow:hidden; padding:0; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  #panel.collapsed h3, #panel.collapsed #panelBody { display:none; }
  #panel.collapsed #panelToggle { display:block; width:44px; height:44px; border:0; border-radius:50%; margin:0 !important; padding:0; background:#ffffffee; font-size:15px; }
  #coords { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background:#f3f3f3; border-radius:8px; padding:6px; margin-top:8px; word-break:break-all; white-space:pre-wrap; font-size:11px; }
  #end { position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; background:#ffffffaa; z-index:10; font-weight:800; text-align:center; }
  #end .big { font-size:86px; line-height:1; }
  #end .mid { font-size:42px; margin-top:8px; }
  #end button { margin-top:18px; font-size:20px; padding:10px 18px; border-radius:12px; border:2px solid #333; background:white; }
  #warn { position:fixed; left:12px; bottom:12px; background:#fff3cd; border:1px solid #ffcc66; padding:8px 10px; border-radius:8px; font-size:12px; max-width:420px; display:none; z-index:5; }
  @media (max-width: 760px) {
    #info { top:8px; font-size:12px; padding:6px 10px; max-width:76vw; }
    #hud { top:58px; left:8px; font-size:12px; padding:7px 8px; min-width:104px; }
    #modeBox { top:170px; left:8px; width:58px; padding:6px; }
    #modeBox .modeTitle { font-size:11px; }
    #modeBox button { font-size:11px; padding:5px 1px; }
    #controlBar { bottom:14px; gap:6px; }
    #btn, #startTaskBtn, #timerTaskBtn { height:28px; font-size:12px; padding:4px 9px; }
    #panel { top:54px; right:8px; width:min(92vw,350px); max-height:82vh; }
    #panel.collapsed { top:58px; right:8px; width:42px; height:42px; max-height:42px; }
    #panel.collapsed #panelToggle { width:42px; height:42px; }
  }
</style>

{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<body>
<div id="info">SHAPr21 Tray Support：0SET位置から開始 → STARTでタイマーボタン前へ移動 → 「ボタン」で計測開始 → Lでトレー端を把持して支える → 手前へ搬送・設置 → 「ボタン」で計測停止。</div>
<div id="hud">TIME: <span id="time">0.0</span><br>PHASE: <span id="phase">READY</span><br>MODE: <span id="modeName">軽量</span><br>義手: <span id="armName">前腕</span><br><span id="setStatus" style="color:#999;">SET OFF</span></div>
<div id="modeBox">
  <div class="modeTitle">Tray Support</div>
  <button id="modeLight" type="button" class="on">軽量</button>
  <button id="modeHeavy" type="button">重量</button>
  <div class="modeTitle" style="margin-top:8px;">義手</div>
  <button id="armForearm" type="button" class="on">前腕</button>
  <button id="armUpper" type="button">上腕</button>
  <button id="armShoulder" type="button">肩</button>
  <button id="resetBtn" type="button">RESET</button>
  <button id="setBtn" type="button">SET</button>
  <div id="calibBox">
    <button id="calibZero" type="button">0SET</button>
    <button id="calibStart" type="button">START</button>
    <button id="calibHold" type="button">HOLD</button>
    <button id="calibPlace" type="button">PLACE</button>
    <button id="calibTimer" type="button">TIMER</button>
  </div>
</div>
<div id="controlBar"><button id="btn">L<span>GRIP</span></button><button id="startTaskBtn" type="button">START</button><button id="timerTaskBtn" type="button">ボタン</button></div>
<div id="warn"></div>
<div id="end"><div class="big" id="finalTime">0.0s</div><div class="mid">END</div><button id="restartBtn">もう一度</button></div>
<div id="panel" class="collapsed">
  <h3>SHAP調整パネル</h3>
  <button id="panelToggle" type="button">調</button>
  <div id="panelBody">
    <h4>0SET：真の初期位置</h4>
    <label>0SET-X <input id="zeroX" type="range" min="-2.00" max="2.00" step="0.01"><span id="zeroXv"></span></label>
    <label>0SET-Y <input id="zeroY" type="range" min="-1.00" max="2.00" step="0.01"><span id="zeroYv"></span></label>
    <label>0SET-Z <input id="zeroZ" type="range" min="-2.00" max="2.00" step="0.01"><span id="zeroZv"></span></label>
    <label>0回転X <input id="zeroRX" type="range" min="-3.14" max="3.14" step="0.01"><span id="zeroRXv"></span></label>
    <label>0回転Y <input id="zeroRY" type="range" min="-3.14" max="3.14" step="0.01"><span id="zeroRYv"></span></label>
    <label>0回転Z <input id="zeroRZ" type="range" min="-3.14" max="3.14" step="0.01"><span id="zeroRZv"></span></label>

    <h4>トレー・把持</h4>
    <label>トレー幅 <input id="trayW" type="range" min="0.20" max="0.90" step="0.01"><span id="trayWv"></span></label>
    <label>トレー奥行 <input id="trayD" type="range" min="0.15" max="0.70" step="0.01"><span id="trayDv"></span></label>
    <label>底板厚 <input id="trayT" type="range" min="0.005" max="0.08" step="0.005"><span id="trayTv"></span></label>
    <label>端立上り高さ <input id="rimH" type="range" min="0.005" max="0.20" step="0.005"><span id="rimHv"></span></label>
    <label>端立上り厚 <input id="rimT" type="range" min="0.005" max="0.06" step="0.005"><span id="rimTv"></span></label>
    <label>トレー回転X <input id="prx" type="range" min="-3.14" max="3.14" step="0.01"><span id="prxv"></span></label>
    <label>トレー回転Y <input id="pry" type="range" min="-3.14" max="3.14" step="0.01"><span id="pryv"></span></label>
    <label>トレー回転Z <input id="prz" type="range" min="-3.14" max="3.14" step="0.01"><span id="przv"></span></label>
    <label>G-X <input id="gx" type="range" min="-1.50" max="1.50" step="0.01"><span id="gxv"></span></label>
    <label>G-Y <input id="gy" type="range" min="-1.50" max="1.50" step="0.01"><span id="gyv"></span></label>
    <label>G-Z <input id="gz" type="range" min="-1.50" max="1.50" step="0.01"><span id="gzv"></span></label>
    <label>本体X <input id="baseX" type="range" min="-1.00" max="1.00" step="0.005"><span id="baseXv"></span></label>
    <label>本体Y <input id="baseY" type="range" min="-1.00" max="1.00" step="0.005"><span id="baseYv"></span></label>
    <label>本体Z <input id="baseZ" type="range" min="-1.00" max="1.00" step="0.005"><span id="baseZv"></span></label>
    <label>トレー相対X <input id="sgx" type="range" min="-0.50" max="0.50" step="0.005"><span id="sgxv"></span></label>
    <label>トレー相対Z <input id="sgz" type="range" min="-0.50" max="0.50" step="0.005"><span id="sgzv"></span></label>
    <label>トレーX補正 <input id="sphereX" type="range" min="-0.50" max="0.50" step="0.005"><span id="sphereXv"></span></label>
    <label>トレーY補正 <input id="sphereY" type="range" min="-0.20" max="0.50" step="0.005"><span id="sphereYv"></span></label>
    <label>トレーZ補正 <input id="sphereZ" type="range" min="-0.50" max="0.50" step="0.005"><span id="sphereZv"></span></label>

    <h4>グライファー角度</h4>
    <label>回転X <input id="rx" type="range" min="-3.14" max="3.14" step="0.01"><span id="rxv"></span></label>
    <label>回転Y <input id="ry" type="range" min="-3.14" max="3.14" step="0.01"><span id="ryv"></span></label>
    <label>回転Z <input id="rz" type="range" min="-3.14" max="3.14" step="0.01"><span id="rzv"></span></label>

    <h4>Jaw角度</h4>
    <label>開 <input id="openA" type="range" min="-0.20" max="1.00" step="0.01"><span id="openAv"></span></label>
    <label>閉 <input id="closedA" type="range" min="-0.30" max="0.80" step="0.01"><span id="closedAv"></span></label>

    <h4>速度プロファイル</h4>
    <label>上腕Lift <input id="upperLift" type="range" min="0.5" max="8.0" step="0.1"><span id="upperLiftv"></span></label>
    <label>上腕Place <input id="upperPlace" type="range" min="0.5" max="8.0" step="0.1"><span id="upperPlacev"></span></label>
    <label>肩Lift <input id="shoulderLift" type="range" min="0.5" max="10.0" step="0.1"><span id="shoulderLiftv"></span></label>
    <label>肩Place <input id="shoulderPlace" type="range" min="0.5" max="10.0" step="0.1"><span id="shoulderPlacev"></span></label>

    <h4>場所</h4>
    <label>後方X <input id="rearX" type="range" min="-1.20" max="1.20" step="0.01"><span id="rearXv"></span></label>
    <label>後方Z <input id="rearZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="rearZv"></span></label>
    <label>前方X <input id="frontX" type="range" min="-1.20" max="1.20" step="0.01"><span id="frontXv"></span></label>
    <label>前方Z <input id="frontZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="frontZv"></span></label>
    <label>タイマX <input id="timerX" type="range" min="-1.20" max="1.20" step="0.01"><span id="timerXv"></span></label>
    <label>タイマZ <input id="timerZ" type="range" min="-1.20" max="1.20" step="0.01"><span id="timerZv"></span></label>

    <button id="saveAll" type="button">保存</button>
    <button id="resetAll" type="button">初期値</button>
    <button id="copyAll" type="button">設定コピー</button>
    <div id="coords"></div>
  </div>
</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const STORAGE_KEY = 'greifer_shapr21_tray_support_v1_config';
const FLOOR_Y = -0.35;
const DEFAULT_CONFIG = {
  trayWidth: 0.58,
  trayDepth: 0.38,
  trayThickness: 0.025,
  rimHeight: 0.07,
  rimThickness: 0.02,
  prismRot: [0.00, 0.00, 0.00],
  graspLocal: [0.24, 0.40, -0.10],
  baseOffset: [0.00, 0.00, 0.00],
  sphereGripOffset: [0.24, 0.00],
  spherePosOffset: [0.00, 0.08, 0.00],
  liftHeight: 0.06,
  gripperRot: [0.13, 0.00, -0.15],
  openAngle: 0.66,
  closedAngle: 0.18,
  zeroSetBase: [0.38, -0.24, 0.63],
  zeroSetRot: [0.00, 0.00, 0.00],
  upperLiftMult: 3.0,
  upperPlaceMult: 3.0,
  shoulderLiftMult: 6.0,
  shoulderPlaceMult: 6.0,
  rearSlot: [0.00, -0.38],
  frontCup: [0.00, 0.10],
  timerButton: [0.15, 0.08]
};
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function loadConfig(){ try { const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null'); return s ? {...clone(DEFAULT_CONFIG), ...s} : clone(DEFAULT_CONFIG); } catch { return clone(DEFAULT_CONFIG); } }
let config = loadConfig();
let mode = 'light';
let currentArm = 'forearm';

const scene = new THREE.Scene(); scene.background = new THREE.Color(0xeef8ee);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 100); camera.position.set(0,1.15,3.0);
const renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(devicePixelRatio); document.body.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement); controls.target.set(0,0.18,0); controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,1.8)); const light=new THREE.DirectionalLight(0xffffff,2.5); light.position.set(3,5,4); scene.add(light);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(7,5),new THREE.MeshStandardMaterial({color:0xf2f2f2})); ground.rotation.x=-Math.PI/2; ground.position.y=FLOOR_Y; scene.add(ground);

const root = new THREE.Group(); root.rotation.x = -Math.PI/2; scene.add(root);
const jawPivot = new THREE.Group(); root.add(jawPivot);
const loader = new GLTFLoader();
let body=null, jaw=null, normalized=false;
let state='ready', moving=false, angle=config.openAngle, targetAngle=config.openAngle;
let sphere=null, board=null, rearSlotObj=null, frontCupObj=null, wallObj=null, timerBase=null, timerButtonMesh=null;
let startTime=0, timerRunning=false, finalSeconds=0;
let calibrationMode=false, calibrationState='START';

function setWarn(msg){ const w=document.getElementById('warn'); w.textContent=msg; w.style.display='block'; }
function setPhase(p){ document.getElementById('phase').textContent = p; }
function setMode(newMode){ mode=newMode; document.getElementById('modeLight').classList.toggle('on', mode==='light'); document.getElementById('modeHeavy').classList.toggle('on', mode==='heavy'); document.getElementById('modeName').textContent = mode==='light' ? '軽量' : '重量'; makeSphere(); resetTask(); }
function setArm(newArm){
  currentArm = newArm;
  document.getElementById('armForearm').classList.toggle('on', currentArm==='forearm');
  document.getElementById('armUpper').classList.toggle('on', currentArm==='upper');
  document.getElementById('armShoulder').classList.toggle('on', currentArm==='shoulder');
  document.getElementById('armName').textContent = currentArm==='forearm' ? '前腕' : (currentArm==='upper' ? '上腕' : '肩');
}
function liftMult(){ return currentArm==='upper' ? config.upperLiftMult : (currentArm==='shoulder' ? config.shoulderLiftMult : 1.0); }
function placeMult(){ return currentArm==='upper' ? config.upperPlaceMult : (currentArm==='shoulder' ? config.shoulderPlaceMult : 1.0); }
document.getElementById('modeLight').onclick=()=>setMode('light'); document.getElementById('modeHeavy').onclick=()=>setMode('heavy');
document.getElementById('armForearm').onclick=()=>setArm('forearm');
document.getElementById('armUpper').onclick=()=>setArm('upper');
document.getElementById('armShoulder').onclick=()=>setArm('shoulder');
document.getElementById('resetBtn').onclick=()=>resetTask();
document.getElementById('setBtn').onclick=()=>toggleCalibration();
document.getElementById('calibZero').onclick=()=>setCalibrationState('ZERO');
document.getElementById('calibStart').onclick=()=>setCalibrationState('START');
document.getElementById('calibHold').onclick=()=>setCalibrationState('HOLD');
document.getElementById('calibPlace').onclick=()=>setCalibrationState('PLACE');
document.getElementById('calibTimer').onclick=()=>setCalibrationState('TIMER');

function makeBoard(){
  if(board) scene.remove(board);
  board = new THREE.Group(); scene.add(board);
  const matBlue = new THREE.MeshStandardMaterial({color:0x1f86d1, roughness:.45});
  const matDark = new THREE.MeshStandardMaterial({color:0x333333, roughness:.5});
  const base = new THREE.Mesh(new THREE.BoxGeometry(1.45,0.06,0.90), matBlue);
  base.position.set(0,FLOOR_Y+0.03,-0.12); board.add(base);
  const railBack = new THREE.Mesh(new THREE.BoxGeometry(0.70,0.06,0.10), matDark);
  railBack.position.set(config.rearSlot[0], FLOOR_Y+0.09, config.rearSlot[1]-0.18); board.add(railBack);

  // 出発位置：トレー外形と同じ薄い輪郭
  const outlineMat = new THREE.MeshStandardMaterial({color:0x333333, roughness:.5});
  const ow=config.trayWidth*1.06, od=config.trayDepth*1.06, t=0.012;
  const y=FLOOR_Y+0.085;
  const addOutline=(cx,cz,mat)=>{
    const g=new THREE.Group();
    const a=new THREE.Mesh(new THREE.BoxGeometry(ow,t,0.014),mat); a.position.set(cx,y,cz-od/2); g.add(a);
    const b=new THREE.Mesh(new THREE.BoxGeometry(ow,t,0.014),mat); b.position.set(cx,y,cz+od/2); g.add(b);
    const c=new THREE.Mesh(new THREE.BoxGeometry(0.014,t,od),mat); c.position.set(cx-ow/2,y,cz); g.add(c);
    const d=new THREE.Mesh(new THREE.BoxGeometry(0.014,t,od),mat); d.position.set(cx+ow/2,y,cz); g.add(d);
    board.add(g); return g;
  };
  rearSlotObj=addOutline(config.rearSlot[0],config.rearSlot[1],outlineMat);

  // 目的地：白い沈んだ窪み＋細い輪郭
  const recess = new THREE.Mesh(
    new THREE.BoxGeometry(config.trayWidth*1.03,0.012,config.trayDepth*1.03),
    new THREE.MeshStandardMaterial({color:0xf7f7f7,roughness:.7})
  );
  recess.position.set(config.frontCup[0],FLOOR_Y+0.052,config.frontCup[1]); board.add(recess);
  frontCupObj=addOutline(config.frontCup[0],config.frontCup[1],new THREE.MeshStandardMaterial({color:0xffffff,roughness:.6}));

  timerBase = new THREE.Mesh(new THREE.BoxGeometry(0.26,0.045,0.18), new THREE.MeshStandardMaterial({color:0x555555, roughness:.35}));
  timerBase.position.set(config.timerButton[0], FLOOR_Y+0.052, config.timerButton[1]); board.add(timerBase);
  timerButtonMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.055,0.025,32), new THREE.MeshStandardMaterial({color:0xff3333, roughness:.3}));
  timerButtonMesh.position.set(config.timerButton[0], FLOOR_Y+0.095, config.timerButton[1]); board.add(timerButtonMesh);
}

function makeSphere(){
  if(sphere){ if(sphere.parent) sphere.parent.remove(sphere); sphere=null; }
  const group = new THREE.Group();
  const color = mode==='light' ? 0xe8e1cf : 0xb8b8b8;
  const matObj = new THREE.MeshStandardMaterial({color, roughness:.45, metalness: mode==='heavy' ? .18 : 0});
  const w=Math.max(0.10,config.trayWidth), d=Math.max(0.10,config.trayDepth);
  const bt=Math.max(0.005,config.trayThickness), rh=Math.max(0.005,config.rimHeight), rt=Math.max(0.005,config.rimThickness);

  const baseTray = new THREE.Mesh(new THREE.BoxGeometry(w,bt,d),matObj);
  baseTray.position.y=bt/2;
  group.add(baseTray);

  // 四周が立ち上がったトレー。端の高さはrimHeightバーで変更可能。
  const frontRim=new THREE.Mesh(new THREE.BoxGeometry(w,rh,rt),matObj);
  frontRim.position.set(0,bt+rh/2,d/2-rt/2);
  const backRim=frontRim.clone(); backRim.position.z=-d/2+rt/2;
  const leftRim=new THREE.Mesh(new THREE.BoxGeometry(rt,rh,d-2*rt),matObj);
  leftRim.position.set(-w/2+rt/2,bt+rh/2,0);
  const rightRim=leftRim.clone(); rightRim.position.x=w/2-rt/2;
  group.add(frontRim,backRim,leftRim,rightRim);

  group.rotation.set(config.prismRot[0],config.prismRot[1],config.prismRot[2]);
  sphere=group;
  scene.add(sphere);
}

async function loadGreifer(){
  try{
    const b = await loader.loadAsync('Body.glb'); body=b.scene; root.add(body);
    const j = await loader.loadAsync('LeftJaw.glb'); jaw=j.scene; jawPivot.add(jaw);
    root.traverse(o=>{ if(o.isMesh){ o.material=new THREE.MeshStandardMaterial({color:0x101010,roughness:.35,metalness:.4}); }});
    normalizeWholeGreifer();
    makeBoard(); makeSphere(); resetTask();
  } catch(e){ console.error(e); setWarn('Body.glb と LeftJaw.glb を、このHTMLと同じフォルダに置いてください。'); }
}
function normalizeWholeGreifer(){ if(normalized) return; root.position.set(0,0,0); root.scale.set(1,1,1); const box=new THREE.Box3().setFromObject(root); const size=box.getSize(new THREE.Vector3()); const max=Math.max(size.x,size.y,size.z); if(max>0){ root.scale.setScalar(0.75/max); normalized=true; }}
function applyGripperRot(){ root.rotation.set(-Math.PI/2 + config.gripperRot[0], config.gripperRot[1], config.gripperRot[2]); }
function applyZeroGripperRot(){ root.rotation.set(-Math.PI/2 + config.zeroSetRot[0], config.zeroSetRot[1], config.zeroSetRot[2]); }
function putRootAtZeroSet(){ applyZeroGripperRot(); root.position.set(config.zeroSetBase[0], config.zeroSetBase[1], config.zeroSetBase[2]); }
function putRootAtReadyStart(){ applyGripperRot(); root.position.set(-0.55,0.25,0.05); moveRootToPutGraspAt(sphereGraspTarget(sphere.position)); }
function getGraspWorld(){ const p=new THREE.Vector3(...config.graspLocal); root.localToWorld(p); return p; }
function moveRootToPutGraspAt(worldPos){ const current=getGraspWorld(); root.position.add(worldPos.clone().sub(current)); root.position.add(new THREE.Vector3(...config.baseOffset)); }
function rootTargetForGraspAt(worldPos){ const current=getGraspWorld(); return root.position.clone().add(worldPos.clone().sub(current)).add(new THREE.Vector3(...config.baseOffset)); }
function sphereOffsetWorld(){ return new THREE.Vector3(config.spherePosOffset[0], config.spherePosOffset[1], config.spherePosOffset[2]); }
function sphereStartCenter(){ return new THREE.Vector3(config.rearSlot[0], FLOOR_Y + config.trayThickness/2, config.rearSlot[1]).add(sphereOffsetWorld()); }
function sphereFrontCenter(){ return new THREE.Vector3(config.frontCup[0], FLOOR_Y + config.trayThickness/2, config.frontCup[1]).add(sphereOffsetWorld()); }
function sphereLiftCenter(){ const c=sphereStartCenter(); return new THREE.Vector3(c.x, c.y + config.liftHeight, c.z); }
function sphereAboveFrontCenter(){ const f=sphereFrontCenter(); return new THREE.Vector3(f.x, f.y + config.liftHeight, f.z); }
function sphereGripOffsetWorld(){ return new THREE.Vector3(config.sphereGripOffset[0], 0, config.sphereGripOffset[1]); }
function sphereGraspTarget(center){ return center.clone().add(sphereGripOffsetWorld()); }
function timerPressPoint(){ return new THREE.Vector3(config.timerButton[0], FLOOR_Y + 0.13, config.timerButton[1]); }
function setTimerButtonLabel(label){ const b=document.getElementById('timerTaskBtn'); if(b) b.textContent=label; }
function setTimerButtonRunning(on){ const b=document.getElementById('timerTaskBtn'); if(b) b.classList.toggle('running', !!on); }
function setStartButtonDone(on){ const b=document.getElementById('startTaskBtn'); if(b) b.classList.toggle('done', !!on); }
function depressTimerButton(){ if(timerButtonMesh) timerButtonMesh.position.y -= 0.015; }
function releaseTimerButton(){ if(timerButtonMesh) timerButtonMesh.position.y += 0.015; }
function resetTask(){
  state='zero_start'; moving=false; timerRunning=false; startTime=0; finalSeconds=0; calibrationMode=false; updateCalibrationUI(); setPhase('0SET'); document.getElementById('end').style.display='none'; document.getElementById('time').textContent='0.0'; setTimerButtonLabel('ボタン'); setTimerButtonRunning(false); setStartButtonDone(false);
  makeBoard(); makeSphere();
  jawPivot.rotation.z=config.openAngle; angle=config.openAngle; targetAngle=config.openAngle;
  sphere.position.copy(sphereStartCenter());
  putRootAtZeroSet();
}
function setJaw(a){ targetAngle=a; }
function updateJaw(){ angle += (targetAngle-angle)*0.08; jawPivot.rotation.z=angle; }
function moveRootSlowly(to, ms, done=null){ moving=true; const from=root.position.clone(); const start=performance.now(); function step(){ const t=Math.min(1,(performance.now()-start)/ms); const u=t*t*(3-2*t); root.position.lerpVectors(from,to,u); if(t<1) requestAnimationFrame(step); else { moving=false; done?.(); }} step(); }

// 肩義手の把持・設置では、クリック不応期を「ゆっくりした小幅の探索運動」として見せる。
// 揺れ幅は小さく、設置時は動作の前半だけ短時間揺れ、最後は正確な目標座標へ収束する。
function moveRootWithGentleShake(to, ms, shakeMs, done=null){
  moving=true;
  const from=root.position.clone();
  const start=performance.now();
  const amplitude=0.0045;
  const frequency=2.0;
  function step(){
    const elapsed=performance.now()-start;
    const t=Math.min(1,elapsed/ms);
    const u=t*t*(3-2*t);
    const base=new THREE.Vector3().lerpVectors(from,to,u);
    const shakeT=Math.min(1, elapsed/Math.max(1,shakeMs));
    const active=elapsed < shakeMs ? Math.sin(Math.PI*shakeT) : 0;
    base.x += Math.sin(elapsed/1000*Math.PI*2*frequency)*amplitude*active;
    base.z += Math.sin(elapsed/1000*Math.PI*2*frequency*0.72)*amplitude*0.28*active;
    root.position.copy(base);
    if(t<1) requestAnimationFrame(step);
    else { root.position.copy(to); moving=false; done?.(); }
  }
  step();
}
function shakeRootInPlace(ms, done=null){
  const target=root.position.clone();
  moveRootWithGentleShake(target, ms, ms, done);
}
function attachSphere(){
  // root.attach() preserves the sphere's world position.
  // The gripper grasp point is allowed to be slightly offset from the sphere center.
  // This lets the user tune the gripper-vs-sphere XY/Z relationship without changing the gripper angle.
  root.attach(sphere);
}
function releaseSphereAtFront(){ scene.attach(sphere); sphere.position.copy(sphereFrontCenter()); }
function updateCalibrationUI(){
  const setBtn=document.getElementById('setBtn');
  const box=document.getElementById('calibBox');
  const status=document.getElementById('setStatus');
  if(setBtn) setBtn.classList.toggle('on', calibrationMode);
  if(box) box.style.display=calibrationMode ? 'block' : 'none';
  if(status){ status.textContent=calibrationMode ? ('SET '+calibrationState) : 'SET OFF'; status.style.color=calibrationMode ? '#118811' : '#999'; }
  ['ZERO','START','HOLD','PLACE','TIMER'].forEach(s=>{
    const el=document.getElementById('calib'+s[0]+s.slice(1).toLowerCase());
    if(el) el.classList.toggle('on', calibrationMode && calibrationState===s);
  });
}
function toggleCalibration(){
  calibrationMode=!calibrationMode;
  timerRunning=false;
  moving=false;
  if(calibrationMode) applyCalibrationState(calibrationState);
  else { state='zero_start'; setPhase('0SET'); }
  updateCalibrationUI();
}
function setCalibrationState(s){ calibrationState=s; calibrationMode=true; applyCalibrationState(s); updateCalibrationUI(); }
function detachSphereToScene(){ if(sphere && sphere.parent!==scene) scene.attach(sphere); }
function applyCalibrationState(s){
  if(!sphere || !root) return;
  moving=false; timerRunning=false;
  document.getElementById('end').style.display='none';
  if(s==='ZERO'){
    detachSphereToScene();
    sphere.position.copy(sphereStartCenter());
    setJaw(config.openAngle); angle=config.openAngle; targetAngle=config.openAngle;
    putRootAtZeroSet();
    state='calib_zero'; setPhase('SET 0SET');
  } else if(s==='START'){
    detachSphereToScene();
    sphere.position.copy(sphereStartCenter());
    setJaw(config.openAngle); angle=config.openAngle; targetAngle=config.openAngle;
    putRootAtReadyStart();
    state='calib_start'; setPhase('SET START');
  } else if(s==='HOLD'){
    detachSphereToScene();
    sphere.position.copy(sphereStartCenter());
    setJaw(config.closedAngle); angle=config.closedAngle; targetAngle=config.closedAngle;
    putRootAtReadyStart()
    root.attach(sphere);
    state='calib_hold'; setPhase('SET HOLD');
  } else if(s==='PLACE'){
    detachSphereToScene();
    sphere.position.copy(sphereFrontCenter());
    setJaw(config.openAngle); angle=config.openAngle; targetAngle=config.openAngle;
    putRootAtReadyStart()
    state='calib_place'; setPhase('SET PLACE');
  } else if(s==='TIMER'){
    detachSphereToScene();
    sphere.position.copy(sphereFrontCenter());
    setJaw(config.openAngle); angle=config.openAngle; targetAngle=config.openAngle;
    root.position.set(-0.55,0.25,0.05);
    moveRootToPutGraspAt(timerPressPoint());
    state='calib_timer'; setPhase('SET TIMER');
  }
}
function onL(){
  if(calibrationMode) return;
  if(moving) return;
  if(state==='zero_start'){
    setPhase('PRESS START');
    return;
  } else if(state==='at_start_button'){
    setPhase('PRESS BUTTON');
    return;
  } else if(state==='ready'){
    setJaw(config.closedAngle); state='gripping'; setPhase('GRIP');
    const afterGrip=()=>{
      attachSphere();
      state='lifting'; setPhase('LIFT');
      const liftTarget=rootTargetForGraspAt(sphereGraspTarget(sphereLiftCenter()));
      moveRootSlowly(liftTarget, 900 * liftMult(), ()=>{
        state='crossing'; setPhase('CROSS WALL');
        const aboveTarget=rootTargetForGraspAt(sphereGraspTarget(sphereAboveFrontCenter()));
        moveRootSlowly(aboveTarget, 2100, ()=>{ state='at_front'; setPhase('PLACE'); });
      });
    };
    if(currentArm==='shoulder') shakeRootInPlace(850, afterGrip);
    else setTimeout(afterGrip, 550);
  } else if(state==='at_front'){
    state='placing'; setPhase('PLACE');
    const placeTarget = rootTargetForGraspAt(sphereGraspTarget(sphereFrontCenter()));
    const placeDuration = 650 * placeMult();
    if(currentArm==='shoulder'){
      // 設置時の揺れは短時間だけ。残りは滑らかに目標へ収束する。
      moveRootWithGentleShake(placeTarget, placeDuration, Math.min(700, placeDuration*0.22), ()=>{
        releaseSphereAtFront(); setJaw(config.openAngle); state='released'; setPhase('TO TIMER');
        setTimeout(()=>{ const target=rootTargetForGraspAt(timerPressPoint()); moveRootSlowly(target, 1700, ()=>{ state='at_timer'; setPhase('PRESS TIMER'); }); }, 300);
      });
      return;
    }
    moveRootSlowly(placeTarget, placeDuration, ()=>{
      releaseSphereAtFront(); setJaw(config.openAngle); state='released'; setPhase('TO TIMER');
      setTimeout(()=>{ const target=rootTargetForGraspAt(timerPressPoint()); moveRootSlowly(target, 1700, ()=>{ state='at_timer'; setPhase('PRESS TIMER'); }); }, 300);
    });
  } else if(state==='at_timer'){
    setPhase('PRESS STOP');
    return;
  } else if(state==='end') { resetTask(); }
}
function onStartButton(){
  if(calibrationMode || moving) return;
  if(state==='zero_start'){
    state='to_start_timer'; setPhase('TO BUTTON');
    const timerTarget=rootTargetForGraspAt(timerPressPoint());
    moveRootSlowly(timerTarget, 900, ()=>{
      state='at_start_button';
      setPhase('PRESS BUTTON');
      setStartButtonDone(true);
    });
  }
}
function onTimerButton(){
  if(calibrationMode || moving) return;
  if(state==='at_start_button'){
    depressTimerButton();
    timerRunning=true; startTime=performance.now();
    setTimerButtonRunning(true);
    setPhase('TO TASK');
    sphere.position.copy(sphereStartCenter());
    const taskTarget=rootTargetForGraspAt(sphereGraspTarget(sphere.position));
    moveRootSlowly(taskTarget, 1200, ()=>{
      state='ready';
      setPhase('READY');
      releaseTimerButton();
    });
  } else if(state==='at_timer'){
    depressTimerButton();
    timerRunning=false; finalSeconds=(performance.now()-startTime)/1000;
    document.getElementById('finalTime').textContent=finalSeconds.toFixed(1)+'s';
    document.getElementById('end').style.display='flex';
    state='end'; setPhase('END');
    setTimerButtonRunning(false);
  }
}
addEventListener('keydown',e=>{ if(e.key==='l'||e.key==='L') onL(); }); document.getElementById('btn').onclick=onL; document.getElementById('startTaskBtn').onclick=onStartButton; document.getElementById('timerTaskBtn').onclick=onTimerButton; document.getElementById('restartBtn').onclick=resetTask;

const ids=['zeroX','zeroY','zeroZ','zeroRX','zeroRY','zeroRZ','trayW','trayD','trayT','rimH','rimT','prx','pry','prz','gx','gy','gz','baseX','baseY','baseZ','sgx','sgz','sphereX','sphereY','sphereZ','rx','ry','rz','openA','closedA','upperLift','upperPlace','shoulderLift','shoulderPlace','rearX','rearZ','frontX','frontZ','timerX','timerZ'];
const map={zeroX:['zeroSetBase',0], zeroY:['zeroSetBase',1], zeroZ:['zeroSetBase',2], zeroRX:['zeroSetRot',0], zeroRY:['zeroSetRot',1], zeroRZ:['zeroSetRot',2], trayW:['trayWidth'], trayD:['trayDepth'], trayT:['trayThickness'], rimH:['rimHeight'], rimT:['rimThickness'], prx:['prismRot',0], pry:['prismRot',1], prz:['prismRot',2], gx:['graspLocal',0], gy:['graspLocal',1], gz:['graspLocal',2], baseX:['baseOffset',0], baseY:['baseOffset',1], baseZ:['baseOffset',2], sgx:['sphereGripOffset',0], sgz:['sphereGripOffset',1], sphereX:['spherePosOffset',0], sphereY:['spherePosOffset',1], sphereZ:['spherePosOffset',2], rx:['gripperRot',0], ry:['gripperRot',1], rz:['gripperRot',2], openA:['openAngle'], closedA:['closedAngle'], upperLift:['upperLiftMult'], upperPlace:['upperPlaceMult'], shoulderLift:['shoulderLiftMult'], shoulderPlace:['shoulderPlaceMult'], rearX:['rearSlot',0], rearZ:['rearSlot',1], frontX:['frontCup',0], frontZ:['frontCup',1], timerX:['timerButton',0], timerZ:['timerButton',1]};

function wrapRangeInputs(){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.parentElement.classList.contains('rangeWrap')) return;
    const wrap=document.createElement('span');
    wrap.className='rangeWrap';
    el.parentNode.insertBefore(wrap, el);
    wrap.appendChild(el);
    const dot=document.createElement('span');
    dot.className='initialDot';
    dot.id=id+'InitDot';
    wrap.appendChild(dot);
  });
}
function initialValueFor(id){
  const path=map[id];
  return path.length===1 ? DEFAULT_CONFIG[path[0]] : DEFAULT_CONFIG[path[0]][path[1]];
}
function updateInitialMarkers(){
  ids.forEach(id=>{
    const el=document.getElementById(id);
    const dot=document.getElementById(id+'InitDot');
    if(!el || !dot) return;
    const min=parseFloat(el.min), max=parseFloat(el.max), val=initialValueFor(id);
    const pct=(val-min)/(max-min)*100;
    dot.style.left=Math.max(0,Math.min(100,pct))+'%';
  });
}
wrapRangeInputs();
updateInitialMarkers();

function getVal(path){ return path.length===1 ? config[path[0]] : config[path[0]][path[1]]; }
function setVal(path,v){ if(path.length===1) config[path[0]]=v; else config[path[0]][path[1]]=v; }
function syncInputs(){ ids.forEach(id=>{ const el=document.getElementById(id); const val=getVal(map[id]); el.value=val; const suffix = ['upperLift','upperPlace','shoulderLift','shoulderPlace'].includes(id) ? '×' : ''; document.getElementById(id+'v').textContent=Number(val).toFixed(3)+suffix; }); document.getElementById('coords').textContent='const CONFIG = '+JSON.stringify(config,null,2)+';'; }
ids.forEach(id=>{ document.getElementById(id).addEventListener('input', e=>{ setVal(map[id], parseFloat(e.target.value)); syncInputs(); if(calibrationMode) applyCalibrationState(calibrationState); else resetTask(); }); });
document.getElementById('saveAll').onclick=()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); alert('保存しました'); };
document.getElementById('resetAll').onclick=()=>{ config=clone(DEFAULT_CONFIG); localStorage.removeItem(STORAGE_KEY); syncInputs(); resetTask(); };
document.getElementById('copyAll').onclick=async()=>{ await navigator.clipboard.writeText('const CONFIG = '+JSON.stringify(config,null,2)+';'); alert('コピーしました'); };
document.getElementById('panelToggle').onclick=()=>{ const p=document.getElementById('panel'); p.classList.toggle('collapsed'); document.getElementById('panelToggle').textContent=p.classList.contains('collapsed')?'調':'閉じる'; };
syncInputs();
updateCalibrationUI();

function animate(){ requestAnimationFrame(animate); controls.update(); updateJaw(); if(timerRunning) document.getElementById('time').textContent=((performance.now()-startTime)/1000).toFixed(1); renderer.render(scene,camera); } animate();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
loadGreifer();
</script>
